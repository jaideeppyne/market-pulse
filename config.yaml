server:
  host: "0.0.0.0"
  port: 8765

retention:
  # Automatic DB cleanup (runs on startup + every cleanup_interval_hours)
  cleanup_interval_hours: 12
  news_keep_days: 7
  scan_snapshots_keep_days: 3
  # Max snapshot rows per symbol (extra guard against bloat)
  max_snapshots_per_symbol: 30
  # Reclaim disk after deletes. With auto_vacuum=INCREMENTAL this is now a cheap
  # incremental page release each cycle; a full VACUUM only runs when the freelist
  # is large (legacy DBs). See scripts/compact_db.py for one-time migration.
  vacuum_on_cleanup: true

earnings:
  # How far ahead to show results (days)
  days_ahead: 7
  # Full universe earnings scan (seconds) — ~3–8 min per full pass
  scan_interval_sec: 1800
  batch_size: 20
  batch_delay_sec: 0.4

scanner:
  # Full universe scan interval (seconds). Lower = faster but more API load / yf rate risk.
  # On free Oracle: keep higher (see deploy/docker-compose.oracle.yml overrides).
  price_scan_interval_sec: 90
  # Hot-list price-only refresh (day %, sparkline) between full scans
  quick_price_interval_sec: 45
  quick_price_batch: 50
  news_scan_interval_sec: 90
  # Rank hot list by buy_score (entry-first). quality_score kept for reference.
  ranking_mode: buy_score
  # Symbols per market per live scan pass. Bounded by default to prevent provider bursts/rate-limit cascades;
  # watchlist and event-led symbols are always prioritized ahead of this rotating background window.
  live_symbols_per_market: 50
  # Symbols per batch for yfinance (avoid rate limits). For more aggressive live coverage raise batch carefully + add delay.
  batch_size: 22
  batch_delay_sec: 0.35
  # Minimum buy_score to appear in hot list (weighted scoring — typically 35–50).
  # Raised to avoid polluting with low-conviction 'weak setup' names (addresses user feedback on low scores at top).
  hot_score_threshold: 30

  # --- Snapshot write-gating (DB-bloat control) ---
  # Only persist a scan_snapshots row when a symbol is meaningful, instead of every
  # symbol every scan. A row is written when ANY of: score >= snapshot_min_score,
  # OR score moved >= snapshot_min_score_delta vs the last stored row for that symbol,
  # OR it's been >= snapshot_min_interval_sec since this symbol was last stored.
  # Rows below snapshot_floor_score are never stored (noise floor).
  snapshot_min_score: 50          # high-conviction rows always kept
  snapshot_min_interval_sec: 600  # at most ~1 row / symbol / 10 min otherwise
  snapshot_min_score_delta: 5     # material score change forces a write
  snapshot_floor_score: 40        # below this, never snapshot
  # How many top movers to broadcast (per market + global cap)
  top_n: 140
  # Official insider/CEO/promoter scanner interval (15-30s target for fastest detection per review)
  insider_scan_interval_sec: 30

  # Discovery / "Scan More" on-demand (triggered from UI button) can be more aggressive
  # because it is user-initiated and limited per call (see /api/discover).
  discovery_batch_size: 20
  discovery_delay_sec: 0.25
  # Max extra symbols to pull from the big multi-source pool (wiki scrapes + huge static + data/*.txt) per discovery click.
  discovery_extra_per_call: 120
  discovery_min_score: 32

markets:
  us:
    enabled: true
    # Built-in liquid universe; expand via data/us_extra.txt
    use_sp500: true
    use_nasdaq100: true
    extra_symbols_file: "data/us_extra.txt"
  india:
    enabled: true
    use_nifty50: true
    use_nifty500_sample: true
    extra_symbols_file: "data/india_extra.txt"
  uk:
    enabled: true
    # FTSE 100 + liquid London names (.L suffix); expand via data/uk_extra.txt
    use_ftse100: true
    extra_symbols_file: "data/uk_extra.txt"

news:
  max_headlines_per_feed: 50
  # Server-friendly sources only. Many news-site RSS endpoints 403/404 from
  # datacenter IPs; Google News RSS aggregates them, and the Yahoo per-symbol
  # RSS backbone (added in the crawler) gives reliable, pre-matched headlines.
  yahoo_per_symbol: true
  yahoo_symbols_per_cycle: 24
  feeds:
    - name: "Google News US - Markets & Earnings"
      url: "https://news.google.com/rss/search?q=(stock+market+OR+earnings+OR+%22results+today%22+OR+upgrade+OR+%22price+target%22)+when:1d&hl=en-US&gl=US&ceid=US:en"
      market: "us"
    - name: "Google News India - Markets & Results"
      url: "https://news.google.com/rss/search?q=(Sensex+OR+Nifty+OR+earnings+OR+results+OR+%22block+deal%22+OR+promoter+OR+FII)+India+when:1d&hl=en-IN&gl=IN&ceid=IN:en"
      market: "india"
    - name: "Google News UK - Shares"
      url: "https://news.google.com/rss/search?q=(FTSE+OR+shares+OR+earnings)+UK+when:1d&hl=en-GB&gl=GB&ceid=GB:en"
      market: "uk"
    - name: "Google News - Earnings Calendar"
      url: "https://news.google.com/rss/search?q=(%22to+report+earnings%22+OR+%22Q1+results%22+OR+%22Q2+results%22+OR+%22board+meeting%22+OR+%22to+announce+results%22)+when:3d&hl=en-IN&gl=IN&ceid=IN:en"
      market: "india"
    - name: "Google News - Smart Money and Whales"
      url: "https://news.google.com/rss/search?q=(buffett+OR+berkshire+OR+icahn+OR+ackman+OR+%22cathie+wood%22+OR+jhunjhunwala+OR+kacholia+OR+kela+OR+damani)+(buys+OR+bought+OR+stake+OR+accumulat)+when:2d&hl=en-US&gl=US&ceid=US:en"
      market: "global"
    - name: "Yahoo Finance Headlines"
      url: "https://finance.yahoo.com/news/rssindex"
      market: "global"

signals:
  # buy_score = entry-heavy (next buy). quality_score = all factors.
  entry_weight: 3.2
  extension_penalty: 2.2

  weights:
    momentum_intraday: 12
    momentum_5d: 8
    rvol: 15
    rsi_sweet_spot: 10
    rsi_oversold_bounce: 8
    near_52w_high: 10
    cup_handle: 12
    positive_fcf: 8
    revenue_growth: 6
    earnings_proximity: 10
    news_burst: 14
    gap_up: 10
    ma_alignment: 8
    macd_bullish: 6
    volume_trend_up: 8
    policy_keyword: 5