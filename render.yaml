services:
  - type: web
    name: market-pulse
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Free tier = 512MB RAM + sleeps on idle. Tune scanners lighter.
      - key: PRICE_SCAN_INTERVAL_SEC
        value: "300"
      - key: HOT_SCORE_THRESHOLD
        value: "45"
    autoDeploy: true
