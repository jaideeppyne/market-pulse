version: '3.8'

services:
  market-pulse:
    build: .
    container_name: market-pulse
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      # Persistent named volume for the SQLite DB (news, snapshots, earnings)
      - market_pulse_data:/app/data
      # Optional: mount your local config if you want to edit it live
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=UTC
      # Oracle-friendly tuning (keeps CPU/network low on Always Free)
      - PORT=8765
      - PRICE_SCAN_INTERVAL_SEC=180     # 3 minutes instead of 90s
      - QUICK_PRICE_INTERVAL_SEC=90
      - HOT_SCORE_THRESHOLD=42          # Slightly higher threshold
      - NEWS_SCAN_INTERVAL_SEC=180
      # You can override DB path if needed, but /app/data is fine with the volume
      # - DB_PATH=/app/data/market_pulse.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  market_pulse_data:
    driver: local
